<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>Sistema de Mercado - Produtos</title>
</head>
<body>

<div class="container">

<h1>Sistema de Produtos</h1>

<input id="nome" placeholder="Nome">
<input id="preco" placeholder="Preço">
<input id="estoque" placeholder="Estoque">

<button onclick="salvarProduto()">Salvar Produto</button>
<button onclick="listarProdutos()">Listar Produtos</button>

<div id="lista"></div>

<hr>

<h1>Cadastro de Clientes</h1>

<input id="clienteNome" placeholder="Nome">
<input id="clienteEmail" placeholder="Email">
<input id="clienteTelefone" placeholder="Telefone">

<button onclick="salvarCliente()">Salvar Cliente</button>
<button onclick="listarClientes()">Listar Clientes</button>

<div id="listaClientes"></div>

</div>





<script src="script.js"></script>

</body>

</html>
